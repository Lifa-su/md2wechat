<script>
// ===== 示例 Markdown =====
const SAMPLE_MD = `# Markdown 转公众号排版工具

> 一款简洁好用的 Markdown 转公众号排版工具，让你专注写作，排版交给我。

## 功能特性

这款工具支持**多种主题**切换，满足不同风格需求：

- 🎯 **简约主题** — 干净清爽，适合日常文章
- 🚀 **科技主题** — 渐变配色，适合技术博客
- 📖 **文艺主题** — 衬线字体，适合散文随笔
- 💼 **商务主题** — 专业稳重，适合行业分析

## 使用方法

1. 在左侧编辑区输入 Markdown 内容
2. 右侧实时预览公众号排版效果
3. 选择喜欢的主题风格
4. 点击「复制富文本」按钮
5. 直接粘贴到公众号编辑器

## 代码高亮

支持多种编程语言的语法高亮，技术文章必备：

\`\`\`javascript
function greet(name) {
  const message = \`Hello, \${name}! 👋\`;
  console.log(message);
  return message;
}

greet('公众号作者');
\`\`\`

\`\`\`python
def fibonacci(n):
    """生成斐波那契数列"""
    a, b = 0, 1
    for _ in range(n):
        yield a
        a, b = b, a + b

for num in fibonacci(10):
    print(num, end=' ')
\`\`\`

行内代码也支持，比如 \`npm install\` 或 \`git commit\`。

## 表格支持

| 功能 | 说明 | 状态 |
|------|------|------|
| Markdown 解析 | 基于 marked.js | ✅ 已完成 |
| 代码高亮 | 基于 highlight.js | ✅ 已完成 |
| 多主题切换 | 4 套精选主题 | ✅ 已完成 |
| 富文本复制 | 兼容公众号编辑器 | ✅ 已完成 |

## 引用与强调

> 写作是思考的外化，排版是思考的美化。
> 
> — 某位不愿透露姓名的公众号作者

这里有**加粗文字**，*斜体文字*，还有~~删除线~~。

---

### 小贴士

- 图片建议使用外链，公众号编辑器会自动上传
- 代码块会自动高亮，支持主流编程语言
- 复制后直接 \`Ctrl+V\` 粘贴到公众号后台即可

**开始写作吧！** ✨
`;

// ===== Marked 配置 =====
marked.setOptions({
  breaks: true,
  gfm: true,
  highlight: function(code, lang) {
    if (lang && hljs.getLanguage(lang)) {
      try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
    }
    try { return hljs.highlightAuto(code).value; } catch(e) {}
    return code;
  }
});

// ===== DOM =====
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const themeSelect = document.getElementById('themeSelect');
const btnCopy = document.getElementById('btnCopy');
const divider = document.getElementById('divider');
const toast = document.getElementById('toast');

// ===== 渲染 =====
function render() {
  const md = editor.value;
  preview.innerHTML = marked.parse(md);
  // 给所有没有 class 的 pre>code 补上高亮
  preview.querySelectorAll('pre code').forEach(block => {
    if (!block.classList.contains('hljs')) {
      hljs.highlightElement(block);
    }
  });
}

// ===== 主题切换 =====
themeSelect.addEventListener('change', () => {
  preview.className = 'preview-inner theme-' + themeSelect.value;
  render();
});

// ===== 实时预览 =====
let renderTimer;
editor.addEventListener('input', () => {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, 80);
});

// ===== Tab 支持 =====
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
    editor.selectionStart = editor.selectionEnd = start + 4;
    render();
  }
});

// ===== 复制富文本 =====
function copyRichText() {
  const html = preview.innerHTML;
  // 获取计算后的样式，内联到 HTML 中以兼容公众号
  const styledHtml = inlineStyles(preview);

  const blob = new Blob([styledHtml], { type: 'text/html' });
  const plainBlob = new Blob([preview.innerText], { type: 'text/plain' });

  const item = new ClipboardItem({
    'text/html': blob,
    'text/plain': plainBlob
  });

  navigator.clipboard.write([item]).then(() => {
    showToast('✅ 已复制富文本，可直接粘贴到公众号编辑器');
    btnCopy.textContent = '✅ 已复制';
    btnCopy.classList.add('copied');
    setTimeout(() => {
      btnCopy.textContent = '📋 复制富文本';
      btnCopy.classList.remove('copied');
    }, 2000);
  }).catch(() => {
    // fallback
    fallbackCopy(styledHtml);
  });
}

// 内联样式 — 公众号编辑器不支持 class，需要把样式写到 style 属性上
function inlineStyles(container) {
  const clone = container.cloneNode(true);
  const allElements = clone.querySelectorAll('*');
  const sourceElements = container.querySelectorAll('*');

  const importantProps = [
    'color', 'background-color', 'background', 'font-size', 'font-family', 'font-weight',
    'font-style', 'line-height', 'text-align', 'text-indent', 'text-decoration',
    'margin', 'margin-top', 'margin-bottom', 'margin-left', 'margin-right',
    'padding', 'padding-top', 'padding-bottom', 'padding-left', 'padding-right',
    'border', 'border-left', 'border-bottom', 'border-top', 'border-right',
    'border-collapse', 'border-radius', 'display', 'white-space', 'overflow-x',
    'word-break', 'letter-spacing', 'max-width', 'width', 'tab-size'
  ];

  // 处理容器本身
  const containerStyle = window.getComputedStyle(container);
  let containerInline = '';
  importantProps.forEach(prop => {
    const val = containerStyle.getPropertyValue(prop);
    if (val) containerInline += `${prop}:${val};`;
  });
  clone.setAttribute('style', containerInline);

  // 处理子元素
  allElements.forEach((el, i) => {
    if (i < sourceElements.length) {
      const computed = window.getComputedStyle(sourceElements[i]);
      let styleStr = '';
      importantProps.forEach(prop => {
        const val = computed.getPropertyValue(prop);
        if (val) styleStr += `${prop}:${val};`;
      });
      el.setAttribute('style', styleStr);
    }
    // 移除 class
    el.removeAttribute('class');
  });
  clone.removeAttribute('class');

  return clone.outerHTML;
}

// Fallback 复制
function fallbackCopy(html) {
  const textarea = document.createElement('textarea');
  textarea.value = preview.innerText;
  document.body.appendChild(textarea);
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('⚠️ 已复制纯文本（浏览器不支持富文本复制，建议用 Chrome）');
  } catch(e) {
    showToast('❌ 复制失败，请手动选中内容复制');
  }
  document.body.removeChild(textarea);
}

// ===== Toast =====
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== 拖拽分栏 =====
let isDragging = false;
divider.addEventListener('mousedown', (e) => {
  isDragging = true;
  divider.classList.add('active');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const main = document.querySelector('.main');
  const rect = main.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const clamped = Math.max(0.2, Math.min(0.8, ratio));
  const panels = main.querySelectorAll('.panel');
  panels[0].style.flex = clamped;
  panels[1].style.flex = 1 - clamped;
});
document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    divider.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ===== 初始化 =====
editor.value = SAMPLE_MD;
render();
</script>
