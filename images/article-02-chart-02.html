<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 900px; height: 600px; overflow: hidden; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #0a0e27; }
.chart {
  width: 900px; height: 600px; padding: 45px 55px;
  background: linear-gradient(180deg, #0a0e27 0%, #111338 100%);
  position: relative;
}
.chart-title { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 8px; }
.chart-subtitle { font-size: 13px; color: rgba(234,179,8,0.45); margin-bottom: 36px; }
/* Matrix container */
.matrix {
  position: relative; width: 720px; height: 420px;
  margin: 0 auto;
}
/* Axes */
.axis-x {
  position: absolute; bottom: 0; left: 50px; right: 0;
  height: 1px; background: rgba(255,255,255,0.1);
}
.axis-y {
  position: absolute; top: 0; bottom: 0; left: 50px;
  width: 1px; background: rgba(255,255,255,0.1);
}
.axis-label-x {
  position: absolute; bottom: -28px; left: 50px; right: 0;
  text-align: center; font-size: 12px; color: rgba(255,255,255,0.3);
}
.axis-label-y {
  position: absolute; top: 50%; left: -8px;
  transform: rotate(-90deg) translateX(-50%);
  transform-origin: left center;
  font-size: 12px; color: rgba(255,255,255,0.3);
  white-space: nowrap;
}
.axis-arrow-x {
  position: absolute; bottom: -4px; right: -8px;
  color: rgba(255,255,255,0.15); font-size: 14px;
}
.axis-arrow-y {
  position: absolute; top: -8px; left: 46px;
  color: rgba(255,255,255,0.15); font-size: 14px;
}
/* Quadrant labels */
.quad-label {
  position: absolute; font-size: 11px; font-weight: 500;
  color: rgba(255,255,255,0.08); letter-spacing: 1px;
}
.quad-tl { top: 20px; left: 140px; }
.quad-tr { top: 20px; right: 100px; }
.quad-bl { bottom: 40px; left: 140px; }
.quad-br { bottom: 40px; right: 100px; }
/* Grid lines */
.grid-h, .grid-v {
  position: absolute; background: rgba(255,255,255,0.03);
}
.grid-h { left: 50px; right: 0; height: 1px; }
.grid-v { top: 0; bottom: 0; width: 1px; }
/* Bubbles */
.bubble {
  position: absolute; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; cursor: default;
  transition: all 0.3s;
}
.bubble-label {
  font-size: 11px; font-weight: 600; color: #fff;
  text-align: center; line-height: 1.3;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.bubble-sub {
  font-size: 9px; color: rgba(255,255,255,0.6);
  margin-top: 2px;
}
/* Specific bubbles positioned by difficulty(x) vs income(y) */
/* x: 50=left(easy) to 720=right(hard), y: 0=top(high) to 420=bottom(low) */
.b1 { /* Micro-SaaS: medium difficulty, high income */
  left: 370px; top: 80px; width: 100px; height: 100px;
  background: radial-gradient(circle, rgba(234,179,8,0.35), rgba(234,179,8,0.1));
  border: 1.5px solid rgba(234,179,8,0.4);
}
.b2 { /* AI自动化代理: medium-low difficulty, very high income */
  left: 250px; top: 40px; width: 110px; height: 110px;
  background: radial-gradient(circle, rgba(245,158,11,0.35), rgba(245,158,11,0.1));
  border: 1.5px solid rgba(245,158,11,0.4);
}
.b3 { /* MCP插件: high difficulty, medium income */
  left: 530px; top: 180px; width: 80px; height: 80px;
  background: radial-gradient(circle, rgba(139,92,246,0.3), rgba(139,92,246,0.08));
  border: 1.5px solid rgba(139,92,246,0.35);
}
.b4 { /* 技术接单: low difficulty, high income */
  left: 130px; top: 90px; width: 95px; height: 95px;
  background: radial-gradient(circle, rgba(234,179,8,0.3), rgba(234,179,8,0.08));
  border: 1.5px solid rgba(234,179,8,0.35);
}
.b5 { /* 浏览器扩展: low difficulty, medium income */
  left: 160px; top: 220px; width: 82px; height: 82px;
  background: radial-gradient(circle, rgba(59,130,246,0.3), rgba(59,130,246,0.08));
  border: 1.5px solid rgba(59,130,246,0.3);
}
.b6 { /* 知识付费: medium difficulty, high income */
  left: 400px; top: 120px; width: 90px; height: 90px;
  background: radial-gradient(circle, rgba(245,158,11,0.3), rgba(245,158,11,0.08));
  border: 1.5px solid rgba(245,158,11,0.35);
}
.b7 { /* 内容矩阵: low-medium difficulty, medium-low income */
  left: 220px; top: 260px; width: 85px; height: 85px;
  background: radial-gradient(circle, rgba(99,102,241,0.25), rgba(99,102,241,0.06));
  border: 1.5px solid rgba(99,102,241,0.3);
}
/* Recommended zone */
.rec-zone {
  position: absolute; left: 100px; top: 30px;
  width: 300px; height: 200px; border-radius: 20px;
  border: 1.5px dashed rgba(34,197,94,0.2);
  background: rgba(34,197,94,0.02);
}
.rec-label {
  position: absolute; top: 8px; right: 12px;
  font-size: 10px; color: rgba(34,197,94,0.4); font-weight: 600;
}
.watermark {
  position: absolute; bottom: 16px; right: 24px;
  color: rgba(234,179,8,0.2); font-size: 10px; letter-spacing: 2px;
}
</style></head>
<body>
<div class="chart">
  <div class="chart-title">启动难度 vs 收益潜力 矩阵</div>
  <div class="chart-subtitle">气泡大小代表市场成熟度，虚线区域为推荐起步路径</div>

  <div class="matrix">
    <div class="axis-x"></div>
    <div class="axis-y"></div>
    <div class="axis-label-x">启动难度 →</div>
    <div class="axis-label-y">收益潜力 →</div>
    <div class="axis-arrow-x">▶</div>
    <div class="axis-arrow-y">▲</div>

    <div class="grid-h" style="top:25%"></div>
    <div class="grid-h" style="top:50%"></div>
    <div class="grid-h" style="top:75%"></div>
    <div class="grid-v" style="left:25%"></div>
    <div class="grid-v" style="left:50%"></div>
    <div class="grid-v" style="left:75%"></div>

    <div class="quad-label quad-tl">低难度 · 高收益</div>
    <div class="quad-label quad-tr">高难度 · 高收益</div>
    <div class="quad-label quad-bl">低难度 · 低收益</div>
    <div class="quad-label quad-br">高难度 · 低收益</div>

    <div class="rec-zone"><div class="rec-label">⭐ 推荐起步</div></div>

    <div class="bubble b4">
      <div class="bubble-label">技术<br>接单</div>
      <div class="bubble-sub">最快见钱</div>
    </div>
    <div class="bubble b2">
      <div class="bubble-label">AI自动化<br>代理</div>
      <div class="bubble-sub">¥35K/月</div>
    </div>
    <div class="bubble b1">
      <div class="bubble-label">Micro<br>SaaS</div>
      <div class="bubble-sub">¥21K/月</div>
    </div>
    <div class="bubble b6">
      <div class="bubble-label">知识<br>付费</div>
      <div class="bubble-sub">¥29K/月</div>
    </div>
    <div class="bubble b5">
      <div class="bubble-label">浏览器<br>扩展</div>
      <div class="bubble-sub">¥13K/月</div>
    </div>
    <div class="bubble b7">
      <div class="bubble-label">内容<br>矩阵</div>
      <div class="bubble-sub">放大器</div>
    </div>
    <div class="bubble b3">
      <div class="bubble-label">MCP<br>插件</div>
      <div class="bubble-sub">新生态</div>
    </div>
  </div>

  <div class="watermark">AI独立开发日记 · LiFa</div>
</div>
</body></html>
